{{- if .Values.monitoring.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis-operator.fullname" . }}-grafana-dashboard
  namespace: {{ default .Release.Namespace .Values.monitoring.grafanaDashboard.namespace }}
  labels:
    {{- include "redis-operator.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.monitoring.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  redis-operator-overview.json: |
{{ .Files.Get "dashboards/redis-overview.json" | indent 4 }}
{{- end }}
