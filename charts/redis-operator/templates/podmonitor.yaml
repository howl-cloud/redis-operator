{{- if and .Values.monitoring.podMonitor.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/PodMonitor") }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "redis-operator.fullname" . }}-redis
  namespace: {{ default .Release.Namespace .Values.monitoring.podMonitor.namespace }}
  labels:
    {{- include "redis-operator.labels" . | nindent 4 }}
    {{- with .Values.monitoring.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    any: true
  selector:
    matchExpressions:
      - key: redis.io/workload
        operator: In
        values:
          - data
      - key: redis.io/cluster
        operator: Exists
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.podMonitor.interval }}
      scrapeTimeout: {{ .Values.monitoring.podMonitor.scrapeTimeout }}
{{- end }}
