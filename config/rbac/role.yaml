apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: redis-operator-manager-role
rules:
  # Core resources managed by the operator.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, patch, delete]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, create]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, patch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update]
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [get, list, watch, create]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # Webhook configuration management for self-managed PKI.
  - apiGroups: [admissionregistration.k8s.io]
    resources: [mutatingwebhookconfigurations, validatingwebhookconfigurations]
    verbs: [get, list, watch, update, patch]
  # PodDisruptionBudgets.
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, patch, delete]
  # RBAC for per-cluster ServiceAccounts.
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [roles, rolebindings]
    verbs: [get, list, watch, create, update]
  # Custom resources.
  - apiGroups: [redis.io]
    resources: [redisclusters]
    verbs: [get, list, watch, patch]
  - apiGroups: [redis.io]
    resources: [redisclusters/status]
    verbs: [get, patch, update]
  - apiGroups: [redis.io]
    resources: [redisbackups]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [redis.io]
    resources: [redisbackups/status]
    verbs: [get, patch]
  - apiGroups: [redis.io]
    resources: [redisscheduledbackups]
    verbs: [get, list, watch]
  - apiGroups: [redis.io]
    resources: [redisscheduledbackups/status]
    verbs: [get, patch]
