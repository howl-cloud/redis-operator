name: Chaos and Fault Injection Test

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/chaos-kind.yml"
      - "api/**"
      - "charts/**"
      - "cmd/**"
      - "config/**"
      - "internal/controller/cluster/**"
      - "internal/instance-manager/**"
      - "test/chaos/**"
      - "webhooks/**"
      - "Dockerfile"
      - "Makefile"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - ".github/workflows/chaos-kind.yml"
      - "api/**"
      - "charts/**"
      - "cmd/**"
      - "config/**"
      - "internal/controller/cluster/**"
      - "internal/instance-manager/**"
      - "test/chaos/**"
      - "webhooks/**"
      - "Dockerfile"
      - "Makefile"
      - "go.mod"
      - "go.sum"
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  chaos-kind:
    name: kind + helm chaos
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-chaos')
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Run chaos and fault injection tests
        run: ./test/chaos/run.sh
