name: Chaos and Fault Injection Test

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  chaos-kind:
    name: kind + helm chaos
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Run chaos and fault injection tests
        run: ./test/chaos/run.sh
