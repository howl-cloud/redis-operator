name: Real Cluster Smoke Test

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".gitignore"
  workflow_dispatch:

jobs:
  smoke-kind:
    name: kind + helm smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Run real-cluster smoke test
        run: ./test/smoke/real_cluster_smoke_test.sh
